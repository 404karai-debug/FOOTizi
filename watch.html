<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footizi — Watch</title>
  <link rel="icon" href="https://i.imgur.com/8mXGQqQ.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
      --green: #00e676; --text: #ffffff; --muted: #888;
      --border: rgba(255,255,255,0.05);
    }
    html, body {
      height: 100%; background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text); overflow-x: hidden;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      height: 56px; gap: 1rem;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .brand {
      font-size: 1.3rem; font-weight: 800;
      color: var(--text); text-decoration: none;
      letter-spacing: -0.5px;
    }
    .brand em { color: var(--green); font-style: normal; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600;
      text-decoration: none; border: 1px solid var(--border);
      color: var(--text); background: var(--bg3);
      transition: all 0.2s;
    }
    .nav-btn:hover { background: #222; border-color: rgba(255,255,255,0.15); }
    .nav-btn.discord { background: #5865f2; border-color: #5865f2; color: #fff; }
    .nav-btn.discord:hover { background: #4752c4; }

    /* LAYOUT */
    .page-wrap {
      display: flex; height: calc(100vh - 56px);
    }
    .player-col {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .chat-col {
      width: 340px; border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    @media (max-width: 900px) {
      .page-wrap { flex-direction: column; height: auto; }
      .chat-col { width: 100%; height: 400px; border-left: none; border-top: 1px solid var(--border); }
    }

    /* PLAYER */
    .player-wrap {
      position: relative; flex: 1;
      background: #000;
    }
    .player-wrap iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    .player-error {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 2rem;
    }
    .player-error.visible { display: flex; }
    .player-error h3 { font-size: 1.1rem; }
    .player-error p { color: var(--muted); font-size: 0.85rem; }
    .retry-btn {
      padding: 8px 20px; border-radius: 8px;
      background: var(--green); color: #000;
      font-weight: 700; border: none; cursor: pointer;
      font-size: 0.85rem;
    }

    /* SOURCES */
    .sources-wrap {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      overflow-x: auto;
    }
    .sources-list {
      display: flex; gap: 8px; align-items: center;
    }
    .src-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3); color: var(--muted);
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: all 0.2s;
    }
    .src-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .src-btn.active { background: var(--green); color: #000; border-color: var(--green); }

    /* WATCH BAR */
    .watch-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
      flex-wrap: wrap;
    }
    .watch-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .watch-title { font-size: 1rem; font-weight: 700; margin-top: 2px; }
    .watch-title .vs { color: var(--green); margin: 0 6px; }
    .watch-right { display: flex; align-items: center; gap: 8px; }
    .info-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--muted);
    }
    .info-tag.spec { color: var(--green); border-color: rgba(0,230,118,0.2); background: rgba(0,230,118,0.05); }
    .info-tag svg { width: 13px; height: 13px; }

    /* CHAT */
    .chat-col iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* LOADING */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 999;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR PAGE */
    .error-page {
      display: none; position: fixed; inset: 0;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 2rem; z-index: 998;
    }
    .error-page.visible { display: flex; }
    .error-page h2 { font-size: 1.4rem; }
    .error-page p { color: var(--muted); }
    .error-page a {
      padding: 10px 24px; border-radius: 10px;
      background: var(--green); color: #000;
      font-weight: 700; text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:0.85rem;">Chargement du match...</p>
</div>

<!-- ERROR -->
<div class="error-page" id="errorPage">
  <h2>Match introuvable</h2>
  <p>Ce match n'existe pas ou a été supprimé.</p>
  <a href="index.html">← Retour à l'accueil</a>
</div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour
    </a>
    <a href="index.html" class="brand">Foot<em>izi</em></a>
    <div class="nav-right">
      <a href="https://discord.gg/tonlien" class="nav-btn discord" target="_blank">Discord</a>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="page-wrap" id="pageWrap" style="display:none;">
  <div class="player-col" id="playerCol">

    <div class="player-wrap" id="playerWrap">
      <div class="player-error" id="playerError">
        <h3>⚠️ Flux indisponible</h3>
        <p>Ce flux ne fonctionne pas. Essaie une autre source.</p>
        <button class="retry-btn" id="retryBtn">Réessayer</button>
      </div>
    </div>

    <div class="sources-wrap">
      <div class="sources-list" id="sourcesList"></div>
    </div>

    <div class="watch-bar">
      <div>
        <div class="watch-label">Vous regardez</div>
        <div class="watch-title" id="watchTitle">...</div>
      </div>
      <div class="watch-right">
        <span class="info-tag" id="channelTag" style="display:none;"></span>
        <span class="info-tag spec">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span id="specNum">0</span>
        </span>
      </div>
    </div>

  </div>

  <div class="chat-col" id="chatCol">
    <iframe id="chatFrame" src="" allowfullscreen></iframe>
  </div>
</div>

<script>
(async () => {
  const SUPABASE_URL = 'https://cauctdopucifmsocjupb.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhdWN0ZG9wdWNpZm1zb2NqdXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njc0NTUsImV4cCI6MjA5MTI0MzQ1NX0.cvNTmmclUbwYLLvkVvAIff2R5diqzg1lQIJSucm9W5o';

  // Récupère l'ID ou le slug depuis l'URL
  const params = new URLSearchParams(location.search);
  const matchId = params.get('id');
  const matchSlug = params.get('slug');

  if (!matchId && !matchSlug) {
    showError(); return;
  }

  // Fetch le match
  let url = `${SUPABASE_URL}/rest/v1/diffusions?select=*`;
  if (matchId) url += `&id=eq.${matchId}`;
  else url += `&slug=eq.${matchSlug}`;
  url += `&limit=1`;

  let match;
  try {
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    if (!data || data.length === 0) { showError(); return; }
    match = data[0];
  } catch(e) {
    showError(); return;
  }

  // Masquer loading
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('pageWrap').style.display = 'flex';

  // Titre
  document.title = `${match.team1} vs ${match.team2} — Footizi`;
  document.getElementById('watchTitle').innerHTML =
    `${match.team1} <span class="vs">VS</span> ${match.team2}`;

  // Chaîne
  if (match.channel) {
    const ct = document.getElementById('channelTag');
    ct.textContent = '📺 ' + match.channel;
    ct.style.display = 'inline-flex';
  }

  // Sources — stream_url est une string simple dans ta table
  const sources = [];
  if (match.stream_url) {
    sources.push({ label: 'Source 1', url: match.stream_url, type: detectType(match.stream_url) });
  }

  // Boutons sources
  const list = document.getElementById('sourcesList');
  if (sources.length === 0) {
    list.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Aucune source disponible</span>';
  } else {
    sources.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'src-btn' + (i === 0 ? ' active' : '');
      btn.textContent = s.label;
      btn.dataset.url = s.url;
      btn.dataset.type = s.type;
      btn.onclick = () => {
        document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadSource(s);
      };
      list.appendChild(btn);
    });
    loadSource(sources[0]);
  }

  // Chat
  const chatFrame = document.getElementById('chatFrame');
  chatFrame.src = `https://www.twitch.tv/embed/footizi/chat?parent=${location.hostname}`;

  // Spectateurs
  let spec = match.viewers || Math.floor(Math.random() * 500) + 100;
  updateSpec(spec);
  setInterval(() => {
    spec = Math.max(10, spec + Math.floor(Math.random() * 20) - 10);
    updateSpec(spec);
  }, 8000);

  // Retry
  document.getElementById('retryBtn').addEventListener('click', () => {
    const active = document.querySelector('.src-btn.active');
    if (active) {
      document.getElementById('playerError').classList.remove('visible');
      loadSource({ url: active.dataset.url, type: active.dataset.type });
    }
  });

  function updateSpec(n) {
    const el = document.getElementById('specNum');
    if (el) el.textContent = n.toLocaleString('fr-FR');
  }

  function detectType(url) {
    if (!url) return 'iframe';
    if (url.includes('.m3u8')) return 'hls';
    return 'iframe';
  }

  function loadSource(source) {
    const wrap = document.getElementById('playerWrap');
    // Supprimer ancien player
    const old = wrap.querySelector('iframe, video');
    if (old) old.remove();
    document.getElementById('playerError').classList.remove('visible');

    if (source.type === 'hls') {
      // Lecteur HLS
      const video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.style.cssText = 'width:100%;height:100%;background:#000;';
      wrap.insertBefore(video, wrap.firstChild);

      // Charger hls.js dynamiquement
      if (!window.Hls) {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
        script.onload = () => initHls(video, source.url);
        document.head.appendChild(script);
      } else {
        initHls(video, source.url);
      }
    } else {
      // Iframe
      const iframe = document.createElement('iframe');
      iframe.src = source.url;
      iframe.allowFullscreen = true;
      iframe.allow = 'autoplay; fullscreen';
      iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
      iframe.onerror = () => {
        document.getElementById('playerError').classList.add('visible');
      };
      wrap.insertBefore(iframe, wrap.firstChild);
    }
  }

  function initHls(video, url) {
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, () => {
        document.getElementById('playerError').classList.add('visible');
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
    } else {
      document.getElementById('playerError').classList.add('visible');
    }
  }

  function showError() {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorPage').classList.add('visible');
  }

})();
</script>

</body>
</html>
